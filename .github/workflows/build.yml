name: Build Zenith Audio

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Windows (x64)'
        type: boolean
        default: true
      build_linux:
        description: 'Linux (x64)'
        type: boolean
        default: false
      build_macos:
        description: 'macOS (x64/ARM)'
        type: boolean
        default: false
      build_android:
        description: 'Android (APK)'
        type: boolean
        default: false
      build_ios:
        description: 'iOS (IPA)'
        type: boolean
        default: false
      build_web:
        description: 'Web'
        type: boolean
        default: false

jobs:
  windows:
    if: inputs.build_windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        shell: pwsh
        run: |
          $ver = (Select-String -Path pubspec.yaml -Pattern '^version: ').Line.Split(': ')[-1]
          $parts = $ver.Split('+')
          echo "BUILD_NAME=$($parts[0])" >> $env:GITHUB_ENV
          echo "BUILD_NUMBER=$($parts[1])" >> $env:GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Build portable (zip)
        run: |
          flutter build windows --release --build-name=$env:BUILD_NAME --build-number=$env:BUILD_NUMBER
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath zenith-audio-windows-$env:BUILD_NAME-portable.zip
      - name: Build installer (Inno Setup)
        continue-on-error: true
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $exe = "build\windows\x64\runner\Release\zenith_audio.exe"
          $iss = @"
          [Setup]
          AppName=卓声 ZENITH AUDIO
          AppVersion=$env:BUILD_NAME
          DefaultDirName={autopf}\ZenithAudio
          DefaultGroupName=卓声 ZENITH AUDIO
          OutputDir=installer_output
          OutputBaseFilename=zenith-audio-setup-$env:BUILD_NAME
          UninstallDisplayIcon={app}\zenith_audio.exe
          [Files]
          Source: "$exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          "@
          $iss | Out-File setup.iss -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-Windows-portable
          path: zenith-audio-windows-${{ env.BUILD_NAME }}-portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-Windows-installer
          path: installer_output/*.exe

  linux:
    if: inputs.build_linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          BUILD_NAME=$(echo "$VER" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VER" | cut -d'+' -f2)
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build
        run: flutter build linux --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
      - run: tar -czf zenith-audio-linux-${{ env.BUILD_NAME }}.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-Linux
          path: zenith-audio-linux-${{ env.BUILD_NAME }}.tar.gz

  macos:
    if: inputs.build_macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          BUILD_NAME=$(echo "$VER" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VER" | cut -d'+' -f2)
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Build
        run: flutter build macos --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
      - run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../zenith-audio-macos-${{ env.BUILD_NAME }}.zip .
          cd -
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-macOS
          path: zenith-audio-macos-${{ env.BUILD_NAME }}.zip

  android:
    if: inputs.build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          BUILD_NAME=$(echo "$VER" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VER" | cut -d'+' -f2)
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-Android
          path: build/app/outputs/flutter-apk/*.apk

  ios:
    if: inputs.build_ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          BUILD_NAME=$(echo "$VER" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VER" | cut -d'+' -f2)
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Decode certificate
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        if: env.IOS_CERTIFICATE_P12 != ''
        run: |
          echo "$IOS_CERTIFICATE_P12" | base64 -d > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import certificate.p12 -P "$IOS_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
      - name: Decode provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        if: env.IOS_PROVISIONING_PROFILE != ''
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | \
            xmllint --xpath "string(//key[.='UUID']/following-sibling::string[1])" -)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "IOS_PROVISIONING_PROFILE_NAME=$UUID" >> $GITHUB_ENV
      - name: Set signing flag
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          if [ -n "$IOS_TEAM_ID" ]; then
            echo "HAS_SIGNING=1" >> $GITHUB_ENV
          else
            echo "HAS_SIGNING=0" >> $GITHUB_ENV
          fi
      - name: Build IPA (unsigned)
        if: env.HAS_SIGNING == '0'
        run: |
          flutter build ios --release --no-codesign --split-debug-info=build/ios/debug-info --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r Runner.ipa Payload/ && cd -
      - name: Build IPA (signed)
        if: env.HAS_SIGNING == '1'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE: "Apple Distribution"
        run: flutter build ipa --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-iOS
          path: build/ios/ipa/*.ipa

  web:
    if: inputs.build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Read version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          BUILD_NAME=$(echo "$VER" | cut -d'+' -f1)
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
      - name: Get dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release
      - name: Create zip archive
        run: |
          cd build/web
          zip -r ../../zenith-audio-web-${{ env.BUILD_NAME }}.zip .
          cd -
      - uses: actions/upload-artifact@v4
        with:
          name: zenith-audio-Web
          path: zenith-audio-web-${{ env.BUILD_NAME }}.zip
